body:
  text: 石室秘錄卷五岐天師兒科治法天師曰兒科得其要無難治今傳一法門使萬世小兒盡登仁壽法在先看氣色後看脈小兒有痰其顏色必鮮豔以鼻之上眼之中間中正精明穴上辨之色紅者心熱也紅筋橫直現於山根者皆亦心熱也色紫者心熱之甚而肺亦熱也色青者肝有風也青筋橫現直現者乃皆肝熱也直者風上行橫者風下行也色黑者風甚而腎中有寒色白者肺中有痰色黃者脾胃虛而作瀉黃筋現於山根不論橫直總皆脾胃之症止有此數色無他顏色故一覽而知小兒之病矣按方論原文為觀其色而病可知矣大人看脈於寸關尺小兒何獨不然按方論為小兒不然但小兒不必看至數止看其數與不數耳按方論僅一句但看其數與不數而已數甚則熱不數則寒也數之中浮者風也沉者寒也緩者濕也澀者邪也滑者痰也有止歇者痛也如此而已方論下為余不必談七表八里俱不必去看自知吾訣則脈經亦不必讀也有止歇者乃痛也余亦不必再談小兒症大約吐瀉厥逆風寒暑熱而已其餘痘疹瘖余無他病或心腹痛或有痞塊或有瘡疔可一覽而知也然而小兒之病虛者十之九實者十之一故藥宜補為先今立三方通治小兒諸症第一方人參三分白朮五分茯苓一錢甘草一分陳皮二分神麯三分半夏一分此六君子加減也通治小兒脾胃弱病神效如傷肉食者加山楂五粒傷米食者加麥芽五分傷麵食者加萊菔子三分吐者加白豆蔻一粒去甘草加生薑三片瀉者加乾薑三分豬苓五分按此方在方論中為治黃筋現於山根者脾胃衰弱之症原方中無半夏有麥芽二分淡竹葉七片在用藥加減變化上陳士鐸亦有修改但在原則精神上均相同第二方治外感也或傷風傷寒或咳嗽或發熱或不發熱或頭痛或鼻塞或痰多或驚悸或角弓反張皆以此方通治之無不神效方用柴胡七分甘草三分桔梗五分半夏三分黃芩三分白芍二錢當歸五分茯苓五分水煎服頭痛者加蔓荊子三分心痛手不可按者乃實火也加梔子一錢按之不痛者乃虛火也加甘草八分管仲五分廣木香三分乳香一分脅痛者加白芍三錢腹痛者以手按之而疼甚者乃食也加大黃一錢按之而不痛者乃寒也非食也加肉桂三分乾薑三分汗出不止者加桑葉一片眼痛而紅腫者乃火也加黃連三分白蒺藜一分喉痛者加山豆根二分按此方在方論中為治感冒風寒方原方中無黃芩桔梗而有半夏三分在用藥加減變化上陳士鐸亦有修改在原則精神上均相同第三方治虛寒之症夜熱出汗夜啼不寐怔忡久嗽不已行遲語遲龜背狗肚將成癆瘵等症方用熟地三錢山萸二錢麥冬二錢化五味五分元參二錢白朮二錢茯苓一錢薏仁三錢丹皮一錢沙參二錢地骨皮二錢水煎服倘兼有外感加柴胡五分白芍三錢白芥子一錢余無可加減矣按方論及傳世本兒科中無此方非傅山之經驗方為陳士鐸所增補因與傅山小兒諸症處方用藥精神不相符
