body:
  text: 岐天師傳兒科祕法山根之上有青筋直現者乃肝熱也方用柴胡三分白芍一錢當歸五分半夏三分白朮五分茯苓一錢山楂三粒甘草一分水煎服有青筋橫直者亦肝熱也但直者風上行橫者風下行亦用前方多加柴胡二分按方論為加柴胡五分麥芽一錢乾薑一分有紅筋直現者乃心熱也亦用前方加黃連一分麥芽五分去半夏加桑白皮三分天花粉二分有紅筋斜現者亦心熱也亦用前方加黃連二分蓋熱極積於胸中也者不可用半夏用桑白皮天花粉可也又有黃筋現於山根者不必論橫直總是脾胃之症或水瀉或上吐或下瀉按方論為或吐瀉或腹痛或不思食方論下為方用余定一方皆能服服之無不神效如皮黃即黃筋也方用白朮五分茯苓五分陳皮二分人參二分神麯一分麥芽二分甘草一分水煎服加淡竹葉七片有痰加半夏一分或白芥子二分或天花粉二分按方論無天花粉有熱如口渴者按方論作如口渴有熱者加麥冬三分黃芩一分有寒者加乾薑一分吐者加白豆蔻一粒瀉者加豬苓五分腹痛者如小兒自家捧腹是須用手按之大叫呼者乃食積也按方論作腹痛按之大叫者食也加大黃三分枳實一分如按之不痛不呼號者乃寒也加乾薑二分如身熱者不可用此方余另立一方萬全湯按方論無此二句凡小兒發熱者無論夜熱早熱晚熱用之無不神效方用柴胡五分白芍一錢當歸五分白朮三分茯苓二分甘草一分山楂三粒黃芩二分蘇葉一分麥冬一分神麯三分水煎服冬天加麻黃一分夏天加石膏三分春天加青蒿三分秋天加桔梗三分按方論中無天字有食加枳殼三分有痰加白芥子三分瀉者加豬苓一錢吐者加白豆蔻一粒小兒諸症不過如此萬不可作驚風治之按方論無萬字有驚風者有疳者用脾胃方加蒲黃三分黃芩三分可也治小兒痢疾神方按方論無神字當歸一錢黃連二分白芍一錢五分枳殼五分檳榔五分甘草三分紅痢加黃連一倍按方論作紅痢倍黃連白痢加澤瀉三分腹痛倍加甘草多加白芍小便赤加木通三分下如豆汁加白朮一錢傷食加山楂麥芽各三分氣虛加人參三分此方通治小兒痢疾加減之無不神效治小兒瘧疾方柴胡六分白朮一錢茯苓一錢當歸一錢白芍一錢五分枳殼五分檳榔五分厚朴五分水煎露一宿再溫與之服熱多者加人參黃耆各五分寒多者加乾薑三分痰多者加白芥子一錢夜發熱者加何首烏熟地各二錢日間發熱者不用加腹痛者加檳榔三分按方論中此方有青皮半夏而無檳榔枳殼而陳士鐸在此方中以檳榔枳殼易青皮半夏陳之改方較傅山原方為佳二方合用亦可因治成人瘧疾用檳榔枳殼厚朴有奇效人所不知治小兒咳嗽神效方按方論原為小兒咳嗽方蘇葉五分桔梗一錢甘草一錢水煎熱服有痰加白芥子五分治小兒口疳流水口爛神方黃柏二錢人參一錢為末敷口內一日三次二日即愈一匙一次一日不過用三次而已小兒之疳皆虛熱也用黃柏以去火人參以健脾土也大人亦可用神效按方論作大人用之亦最效治小兒便蟲神方諸蟲皆可治按方論作小兒便蟲方棐子去殼五個甘草三分為末米飯為丸服完蟲盡化為水矣大人亦用去蟲蓋棐子最能殺蟲又不耗氣也食多則傷脾治小兒蟲積方使君子十個去殼炒香檳榔一錢棐子十個去殼甘草三分為末米飯為丸如梧桐子大與小兒十丸服之每服十丸二日即便蟲五日痊愈神方也按方論無此句兒科驚府吐瀉生下不肯食乳臍下不幹肚臍突出小兒病驚疳吐瀉盡之矣然而驚疳吐瀉不可不分別言之也世人動曰驚風誰知小兒驚則有之而風則無小兒純陽之體不當有風而狀若有風者蓋小兒陽旺內熱熱極則生風是非外來之風乃內出之風也內風何可作外風治之故治風則死矣法當內清其火而外治其驚不可用風藥以表散之也吾今特傳奇方名為清火散驚湯方用白朮三分茯苓三錢陳皮一分梔子三分白芍一錢半夏一分柴胡三分甘草一分水煎服此方健脾平肝之聖藥肝平則火散健脾則驚上又加去火消痰之品自然藥下咽而驚風定也按方論及傳世本兒科尚有用壓風湯治驚風氣虛者石室祕録的兒科中無此外方論中尚治驚風抽制經驗方在傳世本及石室祕録兒科中均無傳世本兒科中有急慢風三六九日一切風俱治方而在方論及石室祕録中則均無膽南星雄黃硃砂人參茯苓天竺黃鉤藤牛黃麝香鬱金柴胡青皮甘草為細末煎膏為丸如緑豆大真金一張為衣陰乾勿泄氣薄荷湯磨服疳症乃脾熱也然亦因心熱而脾火旺極遂至口中流涎若不平其心火則脾火更旺而濕熱上蒸口涎正不能遽止治法不能徒清脾火而當先散心火方用止肝散蘆薈一錢黃連三分薄荷三分茯苓二錢甘草一分桑白皮一錢半夏三分水煎服此方心脾兩清之聖藥不專清脾引火下行則濕自去濕熱去則疳病自愈矣按方論中尚有治疳症的又方傳世本及石室祕録兒科中均無方論及兒科中的口疳流水口爛神方陳士鐸移前疳症瀉痢眼障神效方則被陳士鐸刪去吐症雖胃氣之弱亦脾氣之虛蓋小兒恣意飽餐遂至食而不化久而停積於脾中又久之而上衝於胃中又久之而大吐矣故治吐必先治胃治胃必先治脾吾有奇方止吐速效方名定吐湯人參一錢砂仁一粒白朮五分茯苓二錢陳皮二分半夏一分乾薑二分水煎服無不愈者此方即六君子之變方乃治脾胃之聖藥脾胃安而化導速自然下行不至上吐況方中加減得宜消積有法有不奏功如神者乎按方論及兒科此方尚有麥芽五分山楂三粒方論為水煎服夏加黃連三分冬加乾薑三分止小兒吐無不愈此方六君子之變方瀉症則專責之脾矣論理亦用湯可以取效然而瀉有不同有火瀉有寒瀉不可不分火瀉者小兒必然身如火熱口渴舌燥喜冷飲而不喜飲熱湯若亦以前方投之則益苦矣豫另有奇方名為瀉火止瀉湯方用車前子二錢茯苓一錢白芍一錢黃連三分澤瀉五分豬苓三分麥芽一錢枳殼二分水煎服一劑即止瀉車前茯苓澤瀉豬苓皆止瀉分水之聖藥白芍以平肝使不平克脾黃連清心火不來助脾之熱用麥芽枳殼消滯氣以通水道不必止瀉瀉自止矣寒瀉者腹痛而喜手按摩口不幹而舌滑喜熱飲而不喜冷飲又不可用瀉火之湯五苓散可也然而五苓散尚欠補也蓋小兒致至於寒瀉未有不大傷脾氣者脾氣即傷非人參不能救五苓散無人參僅能止瀉元氣未能頓復我今傳一奇方名為散寒止瀉湯方用人參一錢白朮二錢茯苓二錢肉桂二分甘草一分乾薑二分砂仁一粒神麯五分水煎服此方參苓白朮乃健脾補氣之神品分濕利水之聖藥也又加肉桂乾薑以祛寒砂仁甘草神麯以調和之則寒氣自然越出而泄瀉自止矣小兒生下不肯食乳者乃心熱也蔥煎乳汁令小兒服之亦妙不若用黃連三分煎湯一分灌小兒數匙即食乳矣神效小兒初生臍汁不幹用車前子炒焦為細末敷之即干小兒肚臍突出半寸許此氣旺不收也若不急安之往往變為角弓反張方用茯苓一錢車前子一錢甘草二分陳皮三分通草三分如無通草用燈心一團共煎湯灌之一劑即安神方也岐天師傳治回毒方回毒即消丹金銀花五錢甘草一錢人參二錢元參三錢水煎服一劑即消大半二劑痊愈不須三劑也畫符一道焚在藥中煎湯神效凡服藥不效者焚符於藥中煎藥與小兒飲之十人十生符樣刪去咒曰小兒有病病魔作祟吾今施符治無不愈吾奏天師歧真君律令敕書符前後念一遍焚於藥內又念一遍此祕訣也按世傳本兒科中名痘症回毒或疔毒方銀花五錢甘草一錢人參二錢元參一錢水煎服此外兒科中尚有痘瘡壞證已黑者人將棄之藥下咽即活方論及石室祕録均無人參三錢陳皮一錢蟬蛻五分元參二錢當歸二錢荊芥一錢水煎服此乃元氣虛而火不能發也故用人參以補元氣元參去浮遊之火陳皮去痰開胃則三無礙而相得益彰荊芥以發之又能引火歸經當歸生新去舊消瘀血蟬蛻解毒除風世人何知妙法初起時不可服必壞症乃可服岐天師又傳治回毒歲久不愈方金銀花一兩當歸一兩白朮一兩黃耆二兩薏仁三兩甘草二錢白芥子三錢柴胡五分肉桂五分水煎服四服痊愈其服藥之時更須用藥洗之金銀花一兩生甘草三錢生蔥三條煎二碗又傳疹方治夏日發疹者神效蘇葉一錢麥冬二錢桔梗一錢甘草一錢升麻五分生地二錢元參三錢青蒿三錢水煎服岐真人曰張真人方治四時之疹余方治夏時熱疹也切記此二方何患疹病之難治哉附張真人傳治四時疹方元參三錢麥冬二錢蘇葉一錢升麻八分天花粉一錢金銀花三錢陳皮三分甘草一錢生地三錢黃芩八分桂枝二錢水煎熱服無不神效惟夏天加青蒿三錢可也小兒初數月分量減半一周歲外照此分量不必再傳方也服吾方一劑即愈何至三撰又傳治水痘方亦治熱症而有水氣也柴胡一錢茯苓二錢桔梗一錢甘草五分黃芩五分竹葉十片燈心一撮水煎服有痰者加天花粉三分有食加山楂三粒麥芽三分有火加黃連一分余可不必有此一方水痘無難治矣痘治法天師曰今人看痘為難治不知得其法則無難也初起之時不論身弱身強先以補氣補血之藥為君加一發散之藥則重則必輕而輕者必少無如世人以寒涼之品為主又助以劫散之味此所以輕變重重變死也吾今傳五方朝夕服之至七日無不結壓再無回毒之症十人十活不殺一小兒也第一日方小兒身熱眼如醉眼者此出痘兆也若不是醉眼則非出痘不可用此方用治外感方治之若見眼醉急投此方則痘點即見不必待三日而自出也方用黃耆三錢白朮一錢甘草一錢當歸二錢川芎二錢茯苓三錢柴胡一錢升麻五分麥冬二錢元參三錢陳皮五分荊芥一錢金銀花三錢水煎服此方五歲以上者俱照此分量五歲以下者減半周歲內者又遽減之服此藥自然神思清爽服後見點再用第二方第二日方白朮二錢麥冬三錢甘草一錢桔梗二錢當歸五錢生地五錢元參二錢柴胡一錢升麻三分荊芥一錢茯苓二錢白芍三錢白芥子二錢金銀花三錢服此藥後一身盡見點矣其色必紅而無色白色黑之虞矣第三日方人參五分白芍三錢白朮二錢茯苓二錢元參二錢神麯三分丹皮一錢水煎服服此方後盡皆灌漿無不氣血之足永無退症之虞矣第四日方人參一錢當歸二錢熟地五錢茯苓二錢金銀花三錢陳皮五分甘草一錢元參三錢白朮三錢白芍二錢神麯五分水煎服服此方後小兒必然口脾健要吃食不已不妨少少頻與亦不可食多也第五方不必再用矣然更傳之者恐小兒多食更生他病第五日方人參一錢茯苓三錢白朮二錢甘草一錢水煎服有食加麥芽五分山楂五粒若不傷食不必加也止加金銀花三錢能服此五方期七日前而回春也以上本兒年歲小者俱照第一方減之如小兒已身熱見點日用第三方至第四日則用第四方如壞症另用壞症方按回毒方回毒歲久不愈方應在此條後此外在方論及兒科中有治火丹方二方石室祕録中則無方論中尚有洗胎毒方口瘡方夜啼方尿血方寒積食積方兒科及石室祕録則均無附潘昌遠堂選方此部方從傅山男女科中摘録急救時症仙方此方淨疴淨嘔淨肚痛俱合蒼朮二錢泡柴胡羌活藿香各二錢六曲三錢炒澤瀉木通各一錢清遠茶三錢老蔥二條連根為引抽筋正方用豬粳灑炒熱透乘熱用布包住尉患處如尉冷再炒熱再尉即愈單雙鵝喉或喉痹等症妙方應效多人土細辛又名金茶匙用新鮮生的搗爛取汁開些少酒灌入口內將鵝毛攪汁入至喉中不久其痰吐出即愈發癲發狂良方此症由熱盛所致應效如神假矮瓜其葉背有筋便是將此樹身並根堡水堡至一日之久交發狂者飲之便愈應效馬嘴疔方鮮生水仙子洗淨煅灰放在地去火氣用燈盞底油開搽此方傳自羅浮有友得之已久而未嘗目睹其驗適於舊歲有友偶患此症用治即愈亦信其神妙治毛疔方此症初起登時或肚痛看肚或前心後心痛看前心後心或頭痛如刀刺一樣看頭額角必有起影映如蚊口一樣即將針嘴拔到必停針即是毛疔可用針嘴挑破刮去血便見安然後服解毒湯銀花五錢天葵蒲公英甘谷各二錢地丁三錢淨水煎服急救傷署夾邑夾食妙方不可輕視青蒟七塊緑豆黃皮核各一方尖檳三文白欖七個五靈脂二個硃砂五十文六一散二文淨水煎服立止牙痛方當面見功生硼砂牙硝冰片元明粉各等分為細末搽患處滾油滾粥滾湯滾水所傷方此係應效多人生豬脊肥肉生扁柏葉生蔥三味各等分用刀琢爛敷患處疴痢症妙方鐵門閂系井欄邊之假芫葵骨如鐵線葉如雞腳趾指樣搗爛取汁堡燒酒沖生蜜糖服鐵打吊瘀藥醋方紅花蘇木三稜莪朮梔子三奈羌活牛膝加皮乳香沒藥續斷每味各一錢五分為粗末用黑醋煮透乘熱尉患處生無名腫毒或運甲或石硬等方有破損不合用斑蝥獨活白灰視水米醋將斑蝥獨活研粗末同白灰梘水米醋煮透乘熱浸洗之毒蛇咬傷良方五靈脂靈仙白芒川貝雄黃精各二錢用酒堡服倘服藥不下其頭上必有小泡即將此泡挑破其藥立下應效如神生蛇頭纏指妙方甕菜遠搗爛加片糖擀勻敷患處生臭田螺妙方柿餅一個切片用生薑汁潤搗爛入兒茶末和勻敷患處癲狗咬傷良方牆腳青苔臭草片糖搗爛敷患處炮火鐵砂所傷方番石榴葉搗爛敷患處其鐵砂自出誤食神仙大睡一名山未滿方用甕菜擂爛渣汁灌飲即吐而愈若牙關緊閉從鼻灌入亦吐而愈誤食鴉片姻膏方山膽礬二錢為末沖生水灌飲即吐而愈發熱症出周身芽菜方此經驗此症熱盛所致周身出一條條白色如芽菜一樣凡染此症坐臥起立俱痛可用新鮮生穀芽擦之便條條斷落若無新生穀芽即用新谷發濕搗爛擦之亦斷落附經驗堂選方治外痔方凡人勞思過度傷皮滯血此痔所由成也初起於出恭前面後略有微血若不知節慮養脾又不得良方調治遂至血耗病深而黃倦郁氣滯濕凝結瘡於腸頭而出恭之苦不勝言矣豫曾患此備嘗艱苦幸神賜良方往患頓平如釋重債特刊公世且藥和和平詢稱奇異云搽方黑棗三枚去核入以銅緑合回用紅土包好全性去了紅土取出黑棗銅緑研細末另加藥散雄黃精白芷滑石甘草節防風荊芥穗角刺花粉各二錢共為細末入上存性二味用真麻油開搽患處洗方川萆薢蟬蛻蒼朮白芷角刺花椒堡水日洗數次食方川萆薢防風堡豬精肉湯飲之每食飯用好酒三五杯灌飯同食以暖脾滯氣治跌打傷內筋骨腫痛吊瘀方不見血合用凡跌傷打傷其內必有瘀血凝滯必消其瘀乃平而切近莫如即患處治之尤捷收功方用桃仁歸尾桂枝蘇木草烏白芷防風川烏大黃沒藥荊芥紅花乳香續斷各二錢細辛四錢共為粗末每用四錢加酒半斤加生蔥半斤瓦鉢煮滾乘熱洗尉患處日洗數次見功甚速忌用水煮因必借酒力蔥力方能直透皮毛而入內也是以再尉必再加酒並蔥實以酒蔥為使焉附葉天士先生真傳眼科方此書乃蘇郡名醫葉天士先生所傳眼科奇方存留濟世屢試屢驗試應患目之金針有瞽復明之妙不啻回天再造之功瞳仁屬腎黑珠屬肝白珠屬肺內外眼角屬心上下胞屬脾茲特手録切宜珍寶忽視為泛泛則幸甚方開於後荊齊湯荊芥防風川芎蔓荊子赤芍蟬蛻青葙子菊花生地車前子各一錢甘草四分生薑一片引凡白眼珠有紅絲微痛者宜用荊芥湯治之如大眼角紅腫仍用荊芥湯加酒炒黃芩四分者心火也木通少許引用淡竹葉八片生薑一片涼血散火湯生地二錢赤芍蟬蛻黃芩丹皮荊芥歸尾防風柴胡各八分車前子一錢生薑一片引凡白眼珠盡紅腫痛失眸流淚者火盛也宜用此湯治之如頭痛惡風或發熱加羌活八分眼痛不可忍口渴加酒炒黃連八分腫不消紅不退加紅花四錢此乃百發百中慎勿輕視附刺疔捷法治疔要言凡疔症發於頭面手臂者多發於腹背下部者少初起時一小瘰或麻或癢而不痛漸即長大急須戒口一切魚肉葷腥煎炒發食務要忌淨治法先看疔之發於何處翻閲歌訣用小鐮刀或三三稜針按穴輕刺略為出血隨以麻油和食鹽點穴上以透泄其毒切勿將疔頭刺破為要即以疔膏藥隔水溫軟捏扁貼於患處初起二三日立見消化無須服藥矣如疔頭焮腫者膏藥外用鮮菊葉搗爛塗之即能消腫再用菊葉搗汁服之神效菊花種類甚多惟深秋開花者方可入藥若遲誤至六七日未食發物尚可見效若疔頭破爛或食發物者須防毒陷難治更或寒熱交加務須延醫審脈定方外內兼治矣毒甚者先服蠟礬丸以護心包庶免內陷之慮大凡病症用藥以清涼解毒為主勿用散藥及羚羊角之屬舊本雖有成方未免雜出刪之不録原書有十二經循行圖今略治疔歌鶴頂疔生督脈經宜刺百勞與天庭印堂人中與尾骶委中兩穴保安寧用癟桃炙炭清油調敷天庭疔從尾骶刺肩井面岩百勞治插花頰車與地合中衡一穴須刺至天門疔刺尾骶穴肩井地倉又龍舌地合面岩與插花百勞一二至三節太陽生疔關衝刺百勞七切須挑至地合肩井與印堂大敦竅陰穴當記前髮際疔尾閭訣環跳竅陰是要穴地合百勞與曲池燕利兩穴又龍舌插花疔屬肝膽經髮際印堂刺甚靈百勞七節與地合竅陰大敦保安寧大頭疔發頭腫大急刺尾骶可安泰天庭地合與百勞中衝一訣可無害此疔起於印堂上寸許毒重則頭腫大印堂疔刺尾骶穴關衝百勞人中決更刺兩顴並面岩心肺火毒可療滅山根疔刺尾骶穴百勞挑至第四節人中地合與印堂兩顴骨上亦須訣眉中生疔肝脾熱須刺隱白大敦穴地合兩旁食指尖即商陽穴百勞七節與龍舌眉燕眉梢兩處疔牙咬龍舌曲池經百勞大敦與隱白肩井一訣保安寧上下眼胞若生疔隱白厲兌與天庭更尋曲池並龍舌中衝穴與委中靈用鮮天南星米醋摩塗患處鼻節疔向印堂訣百勞關衝尾閭穴天庭地合與承漿兩口角旁是要訣鼻環疔向尾骶訣百勞一節至四節地合印堂兩頰車關衝穴與外龍舌穿鼻疔須刺關衝地合天庭地倉逢面岩印堂與厲兌尾閭一訣最能松迎香疔刺商陽穴合谷曲池尾骶決地合百勞與天庭陽明熱毒即除滅散笑穴疔刺尾骶唇內齒根即斷交穴證可除百勞關衝與地合天庭印堂刺即舒鼻尖疔向人中訣地合印堂兩龍舌顴骨疔刺厲兌穴小指外側少澤訣內外龍舌與大敦髮際左右看分別生左決左生右決右面岩疔刺厲兌穴天庭百勞與龍舌大敦地合與印堂髮際關衝頰車決頤疔宜從肩井刺商陽合谷曲池至顴髎疔又名對齒小指外側少澤使合谷一穴左右分生左決左生右決右中衝一穴刺乃至牙咬疔刺合谷穴手三里與曲池決疔旁上下左右刺地閣中沖兩顴泄頰車疔刺合谷穴地倉少商肩井決上反唇疔中衝決委中面岩是要穴唇內齒根名斷交印堂關衝與龍舌下反唇疔加地合其餘俱照上反唇照上反唇各穴刺之再刺地合人中疔刺尾閭穴斷交委中是要訣天堂地合與印堂百勞刺至第三節吊角疔刺承漿穴十指尖與地倉決委中隱白與耳湧肩井巨骨是要訣此疔又名鎖井鎖口疔刺地合穴天庭印堂與龍舌耳湧耳垂與委中面岩中衝是宜泄地合疔向臏骨決承漿兩顴天庭穴中指尖根各一針男左女右有分別中指尖即中衝穴指根在中指第三節近掌處耳下項疔合谷治插花肩井面岩使再兼環跳與竅陰百勞印堂俱宜刺耳門疔屬三焦火肩井合谷刺甚妥脘後外關與關衝中衝穴內刺亦可耳湧疔刺合谷穴更兼肩井又龍舌中指尖根各一針百勞七節亦須決耳後生疔屬膀胱肩井至陰面岩當中指尖根各一刺百勞委中與印堂後髮際疔刺至陰尾骶骨上二節尋肩井百勞委中決數處挑泄患無侵正對口疔屬督脈須刺尾骶是上策天庭地合與印堂百勞委中可解厄偏對口疔刺至陰印堂尾閭委中針地合百勞二節刺膀胱毒解患無侵用九頭蘭花根射干二味同搗入鹽少許貼於患處舌尖生疔心火熾中指尖頭即中衝穴須一刺百勞承漿與印堂少衝少府為之使川連五分蓮心五粒煎汁敷患處效喉內患證鎖喉癰兩少商穴刺即松用鮮牛膝一兩鮮馬蘭根一兩同搗再用金果蘭淨末一錢毛茨茹疑為毛茨菰之誤淨末一錢四味共搗和絞汁用鵝毛蘸汁刷入喉內吐出風痰立愈屢見神效喉傍生證發痘後可刺少商合谷口肩井生疔刺龍舌後溪竅陰是要穴地合缺盆與曲池髮際印堂尾閭決腋下生疔名挾癰肩井巨骨與少衝臥胸疔又名井疽中脘關元氣海居百勞三節又七節初起即刺可消除手掌疔生勞官穴脘骨內關中衝決臏骨曲澤與印堂六處刺之毒自泄紅絲疔從脈門起先斷絲頭刺可止寸寸挑至近疔頭中衝穴與龍舌使紅絲疔亦有從合谷發者再刺商陽穴亦有從腳土疑為上字之誤發者挑法俱先從紅絲延處當頭先刺寸寸挑至近根若有白泡先挑破之手槽疔生威靈穴可刺肩井與龍舌更加時骨與曲池四處記取是要訣螺紋疔生大指頭雲門尺澤有來由食指生疔刺合谷曲池龍舌不須憂中指生疔刺曲澤內關龍舌細推求無名指生關衝刺肩髎外關可參謀小指生疔刺脘骨後溪前谷穴須搜初起俱將豬膽套指根一決證可瘳凡手指生疔不論何指初起速將豬苦膽連汁套於手指上即能消腫或用黃連蜈蚣研末雞子清調敷患處指根者患疔之指根第三節近掌處如患大指即刺大指根如患食指即刺食指根余仿此手背疔屬手少陰脘谷外關龍舌針四圍微微細針刺雄黃敷解患無侵背脊疔屬督脈經尾骶委中百勞靈臏骨生疔刺厲兌膝眼委中刺無害湧泉穴中百勞刺陰谷太溪為之使腳虎口中須一針前後隱珠俱可治肉龜疔生腳背上其形似龜痛難量急用銀針刺四圍艾灸疔頭可無恙神效疔膏方松香二十兩用桑柴灰煎汁澄清入松香煮爛取出納冷水中少時再入桑柴灰水中煮以白如玉為度百草霜五兩取百草霜法先須刮淨鍋底要專燒茅柴百草取煙煤刮下篩淨研極細無聲為度樹柴煙煤無用去油乳香三兩研極細白蠟二兩切為粗末去油沒藥三兩研極細黃蠟十兩刮取片麻油六兩銅緑五兩研細過絹篩研無聲選吉日淨室焚香齋戒修合忌婦女雞犬及孝服人見用桑柴火先將麻油入鍋煎滾次下松香候稍滾再下白蠟候稍滾再下黃蠟候稍滾再下乳香候稍滾再下沒藥候稍滾再下銅緑候稍滾再下百草霜滾過數次於鍋內冷透搓成條子丸如桂圓核大收藏磁瓷器內臨用取一丸呵軟捏扁切勿見火貼於患處頃刻止痛次日消腫即愈已破爛者貼之亦可霍然神效之速百發百中疔瘡藥之至寶也此方活人甚多而需費無幾務望諸善士或合藥或刻方廣為施送費甚小而功甚大也忌食葷腥煎炒辛辣沸湯大熱生冷麵食豆腐茄子王瓜酒肉等物考正穴法頭部鶴頂當頭頂從鼻直上入髮際三寸半天庭當頭從鼻直上入髮際五分天門即日月兩額角插花額兩旁上髮際一寸半太陽眉後陷中紫脈上是穴忌刺前髮際太陽穴上三寸印堂兩眉間陷中眉燕眉頭穿鼻鼻梁兩旁鼻環鼻兩環笑縫中顴骨即面頄骨面岩顴骨下耳湧耳尖上卷耳取尖即是穴耳垂即貫耳處耳門耳前起肉當耳